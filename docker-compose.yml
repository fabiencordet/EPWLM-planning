services:
  postgres:
    image: postgres:16
    container_name: patin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: patin
    ports:
      - "5432:5432"
    volumes:
      - patin_pg_data:/var/lib/postgresql/data

volumes:
  patin_pg_data:
